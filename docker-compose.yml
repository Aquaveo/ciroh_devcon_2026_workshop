# CIROH DevCon 2026 — TethysDash + MCP Workshop
#
# Three services on the default compose bridge network:
#   tethysdash       — Django app + chatbox UI on 127.0.0.1:8000
#   nrds_mcps        — FastMCP data-layer server on 127.0.0.1:9000
#   tethysdash_mcps  — FastMCP visualization-layer server on 127.0.0.1:9001
#
# Service-to-service traffic uses compose-internal DNS (e.g., tethysdash_mcps
# reaches the Django backend via http://tethysdash:8000/apps/tethysdash).
# Browser → MCP traffic goes via the laptop's SSH tunnel back to localhost:9000
# and localhost:9001. All three published ports are bound to 127.0.0.1 on the
# VM; SSH -L is the only path.
#
# Plan references:
#   docs/plans/2026-05-11-001-feat-tethysdash-mcp-workshop-orchestration-plan.md
#     (Units 3 + 4 — initial tethysdash + nrds_mcps services)
#   docs/plans/2026-05-11-008-feat-workshop-add-tethysdash-mcps-plan.md
#     (Unit 1 — tethysdash_mcps service)

name: ciroh_devcon_2026_workshop

services:
  # ------------------------------------------------------------------------
  # tethysdash — Django + chatbox UI.
  #
  # Primary path (D10): pull ghcr.io/aquaveo/ciroh-devcon-2026:${IMAGE_TAG}.
  # Fallback: build from repos/tethysapp-tethys_dash/.devcontainer/Dockerfile
  # at the pinned SHA. setup.sh handles `docker compose pull tethysdash ||
  # docker compose build tethysdash` so participants don't need to remember.
  # ------------------------------------------------------------------------
  tethysdash:
    image: ghcr.io/aquaveo/ciroh-devcon-2026:${IMAGE_TAG:-v2026.05}
    build:
      context: ./repos/tethysapp-tethys_dash
      dockerfile: .devcontainer/Dockerfile
    container_name: ciroh-devcon-tethysdash
    # `bash -c` (NOT `bash -lc`): the TethysDash image sets PATH via ENV to
    # include /opt/venv/bin, where `tethys` lives. A login shell (`-l`) re-runs
    # /etc/profile and ~/.profile, which resets PATH and drops the venv,
    # producing `tethys: command not found` from inside init.sh (observed
    # 2026-05-11 on a fresh VM build).
    command: ["bash", "-c", "bash .devcontainer/init.sh && bash .devcontainer/run.sh"]
    volumes:
      # Bind-mount the source so participant edits to TethysDash (if they touch
      # it — R5 marks repos/tethysapp-tethys_dash/ as read-only in VS Code) are
      # visible at runtime. The editable install in the image survives because
      # the absolute path matches (see TethysDash .devcontainer/Dockerfile).
      - ./repos/tethysapp-tethys_dash:/workspaces/tethysapp-tethys_dash
      # Preserve init.sh's idempotence marker (${TETHYS_PERSIST}/...) across
      # `docker compose down/up`. Without this, every restart re-runs
      # `tethys db migrate` + `tethys services create persistent` (non-idempotent,
      # guarded by a list-then-create pattern in the existing init.sh).
      # reset-repos.sh tethysapp-tethys_dash --force clears this volume.
      - tethys-persist:/root/.tethys
    ports:
      # Bind to 127.0.0.1 on the VM: only reachable through SSH -L 8000.
      - "127.0.0.1:8000:8000"
    depends_on:
      # No health condition: TethysDash boot is long enough that nrds_mcps
      # finishes first, and forcing service_healthy adds startup ordering
      # fragility for no real win.
      - nrds_mcps
    healthcheck:
      # Static asset path — unauthenticated, reliably 200 under Tethys's dev
      # settings that init.sh applies. Plan finding F-Healthcheck-Path:
      # curl `/` returns 302 to /accounts/login under some portal modes;
      # `curl -f` accepts 3xx silently, masking a real bring-up failure.
      # Q11 pre-flight (docs/pre-conditions.md) verifies this path returns 200
      # against the actual TETHYSDASH_SHA before the event.
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "http://localhost:8000/static/tethys_apps/css/tethys_app_base.css"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  # ------------------------------------------------------------------------
  # nrds_mcps — published prod image overlaid with participant-editable source.
  #
  # The image at ghcr.io/aquaveo/nrds-mcps already ships the FastMCP server
  # with all deps installed at /venv and the package at /app/nextgen_mcp
  # (verified against mcp/nrds_mcps/Dockerfile: WORKDIR /app, COPY nextgen_mcp/
  # ./nextgen_mcp/, USER mcp). The workshop bind-mounts repos/nrds_mcps/
  # nextgen_mcp into that exact path so participant edits override the image's
  # baked-in copy. Restart picks them up; no pip install needed.
  # ------------------------------------------------------------------------
  nrds_mcps:
    image: ghcr.io/aquaveo/nrds-mcps:${NRDS_MCPS_IMAGE_TAG:-latest}
    container_name: ciroh-devcon-nrds-mcps
    # Override image's `USER mcp` so the bind-mount path is writable for any
    # tooling the participant might want to run inside the container (e.g.,
    # `docker compose exec nrds_mcps python -c "..."`). Acceptable per
    # plan R4: per-VM isolation is the security boundary, not in-container uid.
    user: root
    # Override the image's `ENTRYPOINT ["python", "-m", "nextgen_mcp.mcp_server"]`.
    # The workshop launches the server via our hot-reload wrapper so participant
    # edits trigger an automatic restart (watchfiles + bind-mount inotify).
    # `entrypoint: []` is required because compose's `command:` is passed as
    # arguments to ENTRYPOINT, not as a replacement, unless ENTRYPOINT is reset.
    # Plan: docs/plans/2026-05-12-001-feat-workshop-mcp-hot-reload-plan.md
    entrypoint: []
    command:
      - python
      - /workshop-scripts/run-mcp-with-reload.py
      - nextgen_mcp.mcp_server
      - /app/nextgen_mcp
    volumes:
      # Source overlay: shadow the image's baked-in nextgen_mcp with the
      # bind-mounted workshop clone. Image's /venv stays intact (deps
      # available); only the package source changes.
      - ./repos/nrds_mcps/nextgen_mcp:/app/nextgen_mcp
      # Workshop scripts mount (read-only) — exposes run-mcp-with-reload.py
      # to the container's `command:` invocation. ro because the launcher
      # must not be mutated from inside the container.
      - ./scripts:/workshop-scripts:ro
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "9000"
      MCP_TRANSPORT: "streamable-http"
      # Image already sets HOME=/tmp for the DuckDB extension cache fix
      # (workspace memory: project_nrds_mcps_duckdb_home_fix). We keep it
      # explicit here so changing `user: root` doesn't accidentally restore
      # /root and break the DuckDB cache path.
      HOME: "/tmp"
      # watchfiles inotify is the default. If a participant VM SKU's
      # storage driver doesn't propagate file events through the bind-mount,
      # set WATCHFILES_FORCE_POLLING=true here (and accept the idle-CPU
      # cost) to recover. Pre-flight in plan-008 Unit 6 confirms before
      # the workshop ships.
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      # The /health endpoint is registered as a FastMCP custom_route at
      # nextgen_mcp/mcp_server.py:54. Returns 200 once tools/list is ready.
      # Uses `wget` not `curl`: the prod nrds-mcps image ships wget for its
      # own HEALTHCHECK (Dockerfile line 39); curl is NOT installed. Observed
      # 2026-05-11: curl-based healthcheck reported unhealthy on a fully-
      # functional server because `exec: curl: not found` exit'd 127 inside
      # the container.
      test:
        - "CMD"
        - "wget"
        - "--quiet"
        - "--spider"
        - "--tries=1"
        - "http://localhost:9000/health"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ------------------------------------------------------------------------
  # tethysdash_mcps — standalone visualization-layer MCP server.
  #
  # Sibling of nrds_mcps. The ghcr.io/aquaveo/tethysdash-mcps image ships
  # the FastMCP server with deps at /venv and the package at
  # /app/tethysdash_mcp (verified against mcp/tethysdash_mcps/Dockerfile:
  # WORKDIR /app, COPY tethysdash_mcp/ ./tethysdash_mcp/, USER mcp). The
  # workshop bind-mounts repos/tethysdash_mcps/tethysdash_mcp into that
  # exact path so participant edits override the baked-in copy. Restart
  # picks them up; no pip install needed.
  #
  # Port 9001 here is the standalone, exposed on the VM at 127.0.0.1:9001
  # and reachable from the participant's laptop via SSH -L 9001. The
  # *embedded* MCP server inside the tethysdash container also binds 9001
  # but is NEVER published (no `ports:` entry maps it), so there is no
  # collision — the embedded server is unreachable from the browser, and
  # the chatbox URL `http://localhost:9001/mcp` from the laptop resolves
  # to the standalone via SSH tunnel.
  #
  # The two backend-touching tools (list_intake_plugins,
  # add_dynamic_map_layer) call back to the tethysdash service via
  # compose-internal DNS — see TETHYSDASH_BASE_URL below. The pinned
  # TETHYSDASH_SHA must include commit 186fb37 (PR #6) which exposes the
  # anonymous /runtime-plugins/list/ endpoint that the standalone reads.
  # ------------------------------------------------------------------------
  tethysdash_mcps:
    image: ghcr.io/aquaveo/tethysdash-mcps:${TETHYSDASH_MCPS_IMAGE_TAG:-latest}
    container_name: ciroh-devcon-tethysdash-mcps
    # Same `user: root` exception as nrds_mcps — bind-mount writability for
    # any tooling the participant might want to run inside the container.
    # Per-VM isolation remains the security boundary.
    user: root
    # Same entrypoint override as nrds_mcps — see that service for full
    # rationale. The image's ENTRYPOINT is
    # `["python", "-m", "tethysdash_mcp.mcp_server"]`; the launcher wraps it
    # in watchfiles for hot-reload on bind-mounted source.
    entrypoint: []
    command:
      - python
      - /workshop-scripts/run-mcp-with-reload.py
      - tethysdash_mcp.mcp_server
      - /app/tethysdash_mcp
    volumes:
      # Source overlay: shadow the image's baked-in tethysdash_mcp with the
      # bind-mounted workshop clone. Image's /venv stays intact.
      - ./repos/tethysdash_mcps/tethysdash_mcp:/app/tethysdash_mcp
      # Workshop scripts mount (read-only) — same as nrds_mcps.
      - ./scripts:/workshop-scripts:ro
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "9001"
      MCP_TRANSPORT: "streamable-http"
      # HOME=/tmp matches the image default (read-only-fs safety: any lib
      # touching $HOME/.cache or $HOME/.config gets a writable target).
      # Explicit here so changing `user: root` doesn't restore /root.
      HOME: "/tmp"
      # Compose-internal DNS: the standalone reaches the Django backend at
      # the `tethysdash` service name on its own port 8000. This is
      # SERVER-TO-SERVER traffic on the compose network — separate from
      # the BROWSER-TO-SERVER traffic that goes through the SSH tunnel.
      # When unset, the standalone returns a `backend_not_configured`
      # envelope for the two tools that need backend metadata.
      TETHYSDASH_BASE_URL: "http://tethysdash:8000/apps/tethysdash"
    ports:
      # Bind to 127.0.0.1 on the VM: only reachable through SSH -L 9001.
      - "127.0.0.1:9001:9001"
    healthcheck:
      # /health is a FastMCP custom_route at tethysdash_mcp/mcp_server.py.
      # `wget` is the image's own HEALTHCHECK tool (Dockerfile line 39-44);
      # `curl` is NOT installed. Same shape as the nrds_mcps healthcheck.
      test:
        - "CMD"
        - "wget"
        - "--quiet"
        - "--spider"
        - "--tries=1"
        - "http://localhost:9001/health"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  # Named volume scoped to project name `ciroh_devcon_2026_workshop` (set via
  # top-level `name:` above). reset-repos.sh's `docker compose -p ... down -v`
  # targets THIS volume specifically; other compose projects on the same VM
  # are unaffected.
  tethys-persist:
    name: ciroh_devcon_2026_workshop_tethys-persist
